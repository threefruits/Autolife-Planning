[build-system]
requires = ["scikit-build-core>=0.4.3", "nanobind>=2.0.0", "pybind11>=2.10"]
build-backend = "scikit_build_core.build"

[project]
name = "autolife_planning"
version = "0.2.0"
description = "Autolife planning module"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "scipy",
    "pink",
]

[tool.scikit-build]
minimum-version = "0.4"
build-dir = "build/{wheel_tag}"
wheel.packages = ["autolife_planning"]
cmake.build-type = "Release"

[project.optional-dependencies]
dev = ["pre-commit", "pybullet", "pytest>=8.0", "trimesh>=4.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
# Silence third-party noise — none of these come from our code:
#   * osqp's PendingDeprecationWarning fires once per QP iteration
#     during Pink IK solves (~50–300× per test)
#   * qpsolvers' SparseConversionWarning is a perf hint to Pink for
#     handing it dense matrices instead of CSC
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning:osqp",
    "ignore::Warning:qpsolvers",
]
