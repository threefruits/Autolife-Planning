name: Release

# Triggers on any v* tag push (e.g. v0.2.0). Builds manylinux_2_28 x86_64
# wheels for cp310..cp313 via cibuildwheel, then publishes to PyPI via
# Trusted Publishing (OIDC — no API tokens committed).
#
# No sdist is uploaded: the project vendors large native dependencies
# (OMPL, VAMP, Boost, Eigen) and is not intended to be built on a user
# machine at `pip install` time. End users get a prebuilt wheel or a
# "no matching distribution" error.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_wheels:
    name: Build ${{ matrix.python }} wheel (manylinux_2_28 x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        python: [cp310, cp311, cp312, cp313]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build wheel via cibuildwheel
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_BUILD: ${{ matrix.python }}-manylinux_x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.python }}-manylinux_x86_64
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: [build_wheels]
    runs-on: ubuntu-latest
    # Only publish on real tag pushes. workflow_dispatch runs still build
    # (so you can smoke-test the pipeline without shipping).
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/autolife-planning
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheel-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
